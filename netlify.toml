[build]
  publish = "."
  # Pre-render de getoonde listings tot statische HTML (instant openen, geen runtime-fetch).
  command = "node scripts/build-listings.mjs"

[functions]
  directory = "netlify/functions"

# Netlify Image CDN: resize + moderne formaten (WebP/AVIF) voor externe bronafbeeldingen
[images]
  remote_images = ["https://media.apimo.pro/.*", "https://athomecuracao.com/.*"]

# Listing detail pagina
[[redirects]]
  from = "/listing/*"
  to = "/listing.html"
  status = 200

# SPA fallback - admin
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# CSP headers for admin (allow inline scripts)
[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://trovai.nl https://api.resend.com"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Link = "</.well-known/api-catalog>; rel=\"api-catalog\", </sitemap.xml>; rel=\"sitemap\""

# Agent discovery: serve the API catalog with the correct media type (RFC 9727)
[[headers]]
  for = "/.well-known/api-catalog"
  [headers.values]
    Content-Type = "application/linkset+json"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/.well-known/openapi.json"
  [headers.values]
    Content-Type = "application/openapi+json"
    Cache-Control = "public, max-age=3600"

# UTF-8 charset
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"
