[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# Listing detail pagina
[[redirects]]
  from = "/listing/*"
  to = "/listing.html"
  status = 200

# SPA fallback - admin
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
