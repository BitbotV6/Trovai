<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uw voorkeuren — Trovai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --black: #080A0F;
  --black2: #0C0F14;
  --black3: #111519;
  --white: #F4F2EE;
  --gold: #C8A96A;
  --muted: rgba(244,242,238,0.45);
  --border: rgba(244,242,238,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Geist', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.container {
  max-width: 560px;
  width: 100%;
  background: var(--black2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 48px;
  text-align: center;
}

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 32px;
  font-style: italic;
  color: var(--white);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  margin-left: 2px;
  vertical-align: middle;
  margin-bottom: 4px;
}

.tagline {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 40px;
}

h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--white);
  margin-bottom: 12px;
  line-height: 1.3;
}

.status {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 32px;
}

.success-box {
  background: rgba(26,155,127,0.08);
  border: 1px solid rgba(26,155,127,0.25);
  border-radius: 4px;
  padding: 24px;
  margin: 32px 0;
  display: none;
}

.success-box.show {
  display: block;
}

.success-icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.success-title {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  color: var(--white);
  margin-bottom: 8px;
}

.success-desc {
  font-size: 14px;
  color: rgba(244,242,238,0.6);
  line-height: 1.6;
}

.error-box {
  background: rgba(220,38,38,0.08);
  border: 1px solid rgba(220,38,38,0.25);
  border-radius: 4px;
  padding: 24px;
  margin: 32px 0;
  display: none;
}

.error-box.show {
  display: block;
}

.back-link {
  display: inline-block;
  color: var(--gold);
  text-decoration: none;
  font-size: 13px;
  margin-top: 24px;
  transition: opacity 0.2s;
}

.back-link:hover {
  opacity: 0.7;
}

.loading {
  font-size: 14px;
  color: var(--muted);
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">Trovai<span class="dot"></span></div>
  <div class="tagline">AI · Luxury Property Search</div>

  <div id="loading" class="loading">
    Uw voorkeur wordt opgeslagen...
  </div>

  <div id="success" class="success-box">
    <div class="success-icon">✓</div>
    <div class="success-title">Voorkeur opgeslagen</div>
    <div class="success-desc" id="success-message"></div>
  </div>

  <div id="error" class="error-box">
    <div class="success-icon">⚠️</div>
    <div class="success-title">Er ging iets mis</div>
    <div class="success-desc">We konden uw voorkeur niet opslaan. Neem contact met ons op via <a href="mailto:info@trovai.nl" style="color:#C8A96A">info@trovai.nl</a></div>
  </div>

  <a href="/" class="back-link">← Terug naar Trovai</a>
</div>

<script>
// Parse URL params
const params = new URLSearchParams(window.location.search);
const email = params.get('email');
const pref = params.get('pref');

const prefLabels = {
  call: '📞 Bel mij graag binnen 24 uur',
  whatsapp: '💬 WhatsApp is prima',
  email: '✉️ Email is voldoende, bel me niet'
};

async function savePreference() {
  if (!email || !pref) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').classList.add('show');
    return;
  }

  try {
    // Sla voorkeur op via API
    const response = await fetch('/api/save-preference', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, preference: pref, timestamp: new Date().toISOString() })
    });

    if (response.ok) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').classList.add('show');
      document.getElementById('success-message').innerHTML = `
        Bedankt! We hebben uw voorkeur ontvangen:<br><br>
        <strong style="color:var(--gold)">${prefLabels[pref]}</strong><br><br>
        U ontvangt binnen 24 uur een email met uw persoonlijke woningselectie.
      `;
    } else {
      throw new Error('Failed to save');
    }
  } catch (error) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').classList.add('show');
  }
}

// Auto-save on load
savePreference();
</script>

</body>
</html>
