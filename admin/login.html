<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Trovai</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080A0F;color:#F4F2EE;font-family:Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#0C0E14;border:0.5px solid rgba(200,169,106,0.2);border-radius:4px;padding:48px;width:100%;max-width:420px}
.logo{font-size:32px;font-style:italic;color:#C8A96A;margin-bottom:8px;text-align:center}
.logo-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#C8A96A;margin-left:2px;vertical-align:middle;margin-bottom:4px}
.subtitle{font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(200,169,106,0.5);text-align:center;margin-bottom:40px}
.form-group{margin-bottom:20px}
.label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:rgba(200,169,106,0.6);margin-bottom:8px;display:block}
.input{width:100%;background:rgba(255,255,255,0.03);border:0.5px solid rgba(244,242,238,0.1);border-radius:2px;color:#F4F2EE;font-family:Arial,sans-serif;font-size:14px;padding:12px 14px;outline:none;transition:border-color 0.2s}
.input:focus{border-color:rgba(200,169,106,0.45)}
.btn{width:100%;background:linear-gradient(135deg,#C8A96A,#A8853A);color:#080A0F;font-family:Arial,sans-serif;font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;border:none;padding:14px;border-radius:2px;cursor:pointer;transition:opacity 0.2s;margin-top:8px}
.btn:hover{opacity:0.9}
.error{background:rgba(155,48,48,0.15);border:0.5px solid rgba(155,48,48,0.3);color:#E07070;font-size:13px;padding:12px 16px;border-radius:3px;margin-top:16px;display:none}
.error.show{display:block}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">Trovai<span class="logo-dot"></span></div>
  <div class="subtitle">Admin Dashboard</div>
  <form id="loginForm">
    <div class="form-group">
      <label class="label" for="password">Toegangscode</label>
      <input class="input" type="password" id="password" placeholder="Voer code in" required>
    </div>
    <button type="submit" class="btn">Inloggen →</button>
    <div class="error" id="error">Ongeldige toegangscode</div>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const token = 'trovai2026'; // Default token
  
  if (password === token) {
    localStorage.setItem('admin_token', token);
    window.location.href = '/admin/';
  } else {
    document.getElementById('error').classList.add('show');
    setTimeout(() => document.getElementById('error').classList.remove('show'), 3000);
  }
});

// Check if already logged in
if (localStorage.getItem('admin_token')) {
  window.location.href = '/admin/';
}
</script>
</body>
</html>
